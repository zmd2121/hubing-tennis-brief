<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>胡兵网球项目商业化 Proposal - 纯文字版 - 密码访问</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #60646c;
      --line: #d9ddd7;
      --paper: #ffffff;
      --soft: #f1f2ee;
      --accent: #176b4d;
      --error: #a23b2a;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: var(--soft);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }
    main {
      width: min(420px, calc(100% - 32px));
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 28px;
      box-shadow: 0 18px 50px rgba(23, 23, 23, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(23, 107, 77, 0.14);
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 14px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }
    .error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--error);
      font-size: 14px;
    }
  </style>
</head>

      <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
      <button id="submit" type="submit">进入</button>
      <div id="error" class="error" role="alert" aria-live="polite"></div>
    </form>
  </main>

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;

        'raw',
        encoder.encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );

        ['decrypt']
      );
      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: base64ToBytes(encryptedPage.iv) },
        key,
        base64ToBytes(encryptedPage.data)
      );
      return new TextDecoder().decode(plaintext);

        const html = await decrypt(password);
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        error.textContent = '密码不正确，请重新输入。';
        button.disabled = false;
        button.textContent = '进入';
        input.select();
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      unlock(input.value);
    });
  </script>
</body>
</html>
