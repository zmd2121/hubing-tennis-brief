    :root {

      --line: #d9ddd7;

      --soft: #f1f2ee;
      --accent: #176b4d;
      --error: #a23b2a;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: var(--soft);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }
    main {

      border: 1px solid var(--line);
      padding: 28px;
      box-shadow: 0 18px 50px rgba(23, 23, 23, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(23, 107, 77, 0.14);
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 14px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }
    .error {
      min-height: 22px;
      margin-top: 12px;
      color: var(--error);
      font-size: 14px;
    }
  </style>

    const form = document.getElementById('password-form');
    const input = document.getElementById('password');
    const button = document.getElementById('submit');
    const error = document.getElementById('error');

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decrypt(password) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        encoder.encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt: base64ToBytes(encryptedPage.salt),
          iterations: encryptedPage.iterations,
          hash: 'SHA-256'
        },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: base64ToBytes(encryptedPage.iv) },
        key,
        base64ToBytes(encryptedPage.data)
      );
      return new TextDecoder().decode(plaintext);
    }

    async function unlock(password) {
      button.disabled = true;
      button.textContent = '正在验证...';
      error.textContent = '';
      try {
        const html = await decrypt(password);
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        error.textContent = '密码不正确，请重新输入。';
        button.disabled = false;
        button.textContent = '进入';
        input.select();
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      unlock(input.value);
    });
